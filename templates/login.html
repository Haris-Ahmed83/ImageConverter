{% extends "base.html" %}
{% block title %}Sign In — Image Converter{% endblock %}
{% block meta_desc %}Sign in to your ImageConverter account.{% endblock %}
{% block content %}
<div class="page-container auth-page">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account</p>
        <form class="auth-form" onsubmit="event.preventDefault(); alert('Sign in coming soon!');">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit" class="btn btn-primary auth-btn">Sign in</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="/register">Sign up</a></p>
    </div>
</div>
{% endblock %}
