{% extends "base.html" %}
{% block title %}Sign In — ImageConverter{% endblock %}
{% block meta_desc %}Sign in to your ImageConverter account.{% endblock %}
{% block content %}
<div class="auth-section">
    <div class="auth-card-modern">
        <div class="auth-card-header">
            <div class="auth-icon">
                <span class="logo-icon" style="width:48px;height:48px;font-size:22px;border-radius:12px;">C</span>
            </div>
            <h1>Welcome back</h1>
            <p>Sign in to your account to continue</p>
        </div>
        <form class="auth-form" onsubmit="event.preventDefault(); alert('Sign in coming soon!');">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="submit" class="btn btn-primary auth-form-btn">Sign in</button>
        </form>
        <p class="auth-footer-modern">Don't have an account? <a href="/register">Sign up</a></p>
    </div>
</div>
{% endblock %}
