{% extends "base.html" %}
{% block title %}Sign Up — ImageConverter{% endblock %}
{% block meta_desc %}Create your free ImageConverter account.{% endblock %}
{% block content %}
<div class="auth-section">
    <div class="auth-card-modern">
        <div class="auth-card-header">
            <div class="auth-icon">
                <span class="logo-icon" style="width:48px;height:48px;font-size:22px;border-radius:12px;">C</span>
            </div>
            <h1>Create your account</h1>
            <p>Start converting files for free</p>
        </div>
        <form class="auth-form" onsubmit="event.preventDefault(); alert('Sign up coming soon!');">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="John Doe" required>
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a password" required>
            <button type="submit" class="btn btn-primary auth-form-btn">Create account</button>
        </form>
        <p class="auth-footer-modern">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>
{% endblock %}
