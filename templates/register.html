{% extends "base.html" %}
{% block title %}Sign Up — Image Converter{% endblock %}
{% block meta_desc %}Create a free ImageConverter account.{% endblock %}
{% block content %}
<div class="page-container auth-page">
    <div class="auth-card">
        <h1>Create account</h1>
        <p class="auth-subtitle">Start converting images for free</p>
        <form class="auth-form" onsubmit="event.preventDefault(); alert('Sign up coming soon!');">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="John Doe" required>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit" class="btn btn-primary auth-btn">Sign up</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>
{% endblock %}
